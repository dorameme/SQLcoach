version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sqlcoach-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: sqlcoach123
      MYSQL_DATABASE: sqlcoach
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: